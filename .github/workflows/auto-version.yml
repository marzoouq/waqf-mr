name: Auto Version Bump & Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/changelog.json'
      - 'docs/CHANGELOG.md'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Skip if the push was from this action itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get current version
        id: current
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate Arabic date
        id: date
        run: |
          MONTHS=("يناير" "فبراير" "مارس" "أبريل" "مايو" "يونيو" "يوليو" "أغسطس" "سبتمبر" "أكتوبر" "نوفمبر" "ديسمبر")
          DAY=$(date -u +%-d)
          MONTH_IDX=$(($(date -u +%-m) - 1))
          YEAR=$(date -u +%Y)
          # Convert to Arabic-Eastern numerals
          to_arabic() {
            echo "$1" | sed 'y/0123456789/٠١٢٣٤٥٦٧٨٩/'
          }
          AR_DATE="$(to_arabic $DAY) ${MONTHS[$MONTH_IDX]} $(to_arabic $YEAR)"
          echo "arabic=$AR_DATE" >> "$GITHUB_OUTPUT"

      - name: Collect commits since last tag
        id: commits
        run: |
          # Get last version tag or use initial commit
          LAST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges -20 --pretty="%s")
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --no-merges --pretty="%s")
          fi

          # Classify commits into JSON entries
          FEATURES=""
          IMPROVEMENTS=""
          FIXES=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Skip CI commits
            echo "$msg" | grep -qi "\[skip ci\]" && continue
            echo "$msg" | grep -qi "^docs:" && continue

            # Clean commit message
            CLEAN=$(echo "$msg" | sed 's/^feat: //i;s/^fix: //i;s/^improvement: //i;s/^chore: //i;s/^refactor: //i;s/^perf: //i;s/^style: //i')

            if echo "$msg" | grep -qi "^feat:"; then
              FEATURES="$FEATURES|$CLEAN"
            elif echo "$msg" | grep -qi "^fix:"; then
              FIXES="$FIXES|$CLEAN"
            else
              IMPROVEMENTS="$IMPROVEMENTS|$CLEAN"
            fi
          done <<< "$COMMITS"

          # Build JSON changes array
          CHANGES="["
          FIRST=true

          for f in $(echo "$FEATURES" | tr '|' '\n'); do
            [ -z "$f" ] && continue
            $FIRST && FIRST=false || CHANGES="$CHANGES,"
            CHANGES="$CHANGES{\"type\":\"feature\",\"text\":\"$f\"}"
          done

          for i in $(echo "$IMPROVEMENTS" | tr '|' '\n'); do
            [ -z "$i" ] && continue
            $FIRST && FIRST=false || CHANGES="$CHANGES,"
            CHANGES="$CHANGES{\"type\":\"improvement\",\"text\":\"$i\"}"
          done

          for x in $(echo "$FIXES" | tr '|' '\n'); do
            [ -z "$x" ] && continue
            $FIRST && FIRST=false || CHANGES="$CHANGES,"
            CHANGES="$CHANGES{\"type\":\"fix\",\"text\":\"$x\"}"
          done

          # If no classified commits, add generic entry
          if $FIRST; then
            CHANGES="[{\"type\":\"improvement\",\"text\":\"تحسينات وإصلاحات متنوعة\"}"
          fi

          CHANGES="$CHANGES]"
          echo "json=$CHANGES" >> "$GITHUB_OUTPUT"

      - name: Update changelog.json
        run: |
          node -e "
            const fs = require('fs');
            const changelog = JSON.parse(fs.readFileSync('public/changelog.json', 'utf8'));
            const newEntry = {
              version: '${{ steps.bump.outputs.version }}',
              date: '${{ steps.date.outputs.arabic }}',
              changes: JSON.parse('${{ steps.commits.outputs.json }}')
            };
            changelog.unshift(newEntry);
            fs.writeFileSync('public/changelog.json', JSON.stringify(changelog, null, 2) + '\n');
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json public/changelog.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: رفع الإصدار إلى v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push && git push --tags
