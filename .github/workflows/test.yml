name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: Write test summary
        if: always()
        run: |
          echo '## Test Results' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/test-output.txt >> $GITHUB_STEP_SUMMARY

      - name: Check test result
        run: |
          if grep -qE 'Tests\s+[0-9]+ failed' /tmp/test-output.txt; then
            echo "Tests failed — see summary above"
            exit 1
          fi
          if ! grep -q 'Tests' /tmp/test-output.txt; then
            echo "No test output found — tests may have crashed"
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
