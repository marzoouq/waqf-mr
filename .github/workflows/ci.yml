name: CI Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: TypeScript + ESLint + Tests + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npx eslint src/

      - name: Run tests
        run: npx vitest run

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        run: npm run build

      - name: Bundle size report
        run: |
          echo "## 📦 Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/*.js | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL_KB=$(du -sk dist/ | cut -f1)
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$TOTAL_KB" -gt 5120 ]; then
            echo "⚠️ **تحذير:** حجم الحزمة تجاوز 5 ميغابايت ($TOTAL_KB KB)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ حجم الحزمة ضمن الحد المقبول ($TOTAL_KB KB)" >> $GITHUB_STEP_SUMMARY
          fi
