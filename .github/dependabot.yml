version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    groups:
      prod-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      prod-major:
        dependency-type: "production"
        update-types:
          - "major"
      dev-major:
        dependency-type: "development"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 2
    labels:
      - "ci"
    commit-message:
      prefix: "chore(ci):"
    ignore:
      - dependency-name: "actions/setup-node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "actions/upload-artifact"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "codecov/codecov-action"
        update-types:
          - "version-update:semver-major"
