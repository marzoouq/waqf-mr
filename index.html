    <!-- تنظيف عدواني لكاش SW القديم — يُشغّل مرة واحدة فقط -->
    <script>
    (function(){
      try{
        // فقط على الموقع المنشور (ليس المعاينة)
        var h=location.hostname;
        if(h.endsWith('.lovable.app')||h.endsWith('.lovableproject.com'))return;
        if(!navigator.serviceWorker)return;
        var key='sw_nuke_v2';
        if(sessionStorage.getItem(key))return;
        sessionStorage.setItem(key,'1');
        navigator.serviceWorker.getRegistrations().then(function(regs){
          if(!regs.length)return;
          var p=regs.map(function(r){return r.unregister()});
          Promise.all(p).then(function(){
            return caches.keys().then(function(names){
              return Promise.all(names.map(function(n){return caches.delete(n)}));
            });
          }).then(function(){
            location.reload();
          });
        });
      }catch(e){}
    })();
    </script>

    <style>

      #root{min-height:100vh;background:#faf8f5}

    <div id="root">
      <!-- Splash screen -->

        <div id="splash-loader" style="width:40px;height:4px;border-radius:4px;background:linear-gradient(90deg,#1a365d,#c9a96e);animation:pulse 1.5s ease-in-out infinite"></div>
        <div id="splash-error" style="display:none;text-align:center;max-width:360px;margin-top:8px">
          <div style="font-family:Tajawal,sans-serif;font-size:14px;color:#b91c1c;margin-bottom:12px">تعذّر تحميل التطبيق — يرجى تحديث الصفحة</div>
          <button onclick="location.reload()" style="font-family:Tajawal,sans-serif;font-size:14px;font-weight:600;color:#fff;background:#1a5c3a;border:none;border-radius:8px;padding:8px 24px;cursor:pointer">إعادة التحميل</button>
        </div>
      </div>
      <style>#splash{transition:opacity .3s}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}</style>
      <script>setTimeout(function(){var s=document.getElementById('splash');if(s){var l=document.getElementById('splash-loader');var e=document.getElementById('splash-error');if(l)l.style.display='none';if(e)e.style.display='block'}},8000)</script>
    </div>
    <!-- حماية Clickjacking — frame-busting (بديل لـ frame-ancestors التي لا تعمل عبر meta) -->
    <script>try{var h=window.location.hostname;if(window.top!==window.self&&!h.endsWith('.lovable.app')&&!h.endsWith('.lovableproject.com')){window.top.location=window.self.location}}catch(e){}</script>
